<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" fill="none">
  <defs>
    <pattern id="stripes" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(-45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#000" stroke-width="2.5" />
    </pattern>
    <mask id="textMask">
      <text x="140" y="52" text-anchor="middle" font-family="'Arial Black', 'Impact', sans-serif" font-weight="900" font-size="58" fill="white" letter-spacing="4">MUMS</text>
    </mask>
  </defs>
  <!-- Striped text -->
  <rect width="280" height="80" fill="none"/>
  <text x="140" y="52" text-anchor="middle" font-family="'Arial Black', 'Impact', sans-serif" font-weight="900" font-size="58" fill="#1a1a1a" letter-spacing="4">MUMS</text>
  <rect width="280" height="80" fill="url(#stripes)" mask="url(#textMask)" opacity="0.3"/>
  <!-- Subtitle -->
  <text x="140" y="72" text-anchor="middle" font-family="'Georgia', serif" font-size="11" fill="#1a1a1a" letter-spacing="1.5">The Swedish Candy Co.</text>
</svg>
